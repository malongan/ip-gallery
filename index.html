<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP · ARCHIVE</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-title">
            <h1>IP · ARCHIVE</h1>
            <p class="header-subtitle">2026</p>
        </div>
        <div class="header-actions">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索 IP 名称...">
            <select id="brandFilter" class="brand-filter">
                <option value="">全部品牌</option>
            </select>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="gallery-container">
        <div id="gallery" class="gallery">
            <!-- Cards will be rendered here by JavaScript -->
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-image-container">
                <img id="modalImage" src="" alt="">
            </div>
            <div class="modal-info">
                <h2 id="modalName"></h2>
                <p id="modalMeta" class="modal-meta"></p>
                <div class="modal-divider"></div>
                <p id="modalDescription" class="modal-description"></p>
                <div class="modal-divider"></div>
                <div class="modal-actions">
                    <button id="copyNameBtn" class="action-btn">复制名称</button>
                    <a id="brandLink" class="action-btn" href="" target="_blank">品牌官网</a>
                    <a id="officialLink" class="action-btn" href="" target="_blank">官网</a>
                    <a id="sourceLink" class="action-btn" href="" target="_blank">设定</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">已复制</div>

    <script src="JS/scripts.js"></script>
</body>
</html>
