<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP · ARCHIVE</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="logo">
                <span class="logo-pixel"></span>
                IP · ARCHIVE
            </h1>
            <p class="subtitle">Character Collection 2026</p>
        </div>
        
        <div class="search-bar">
            <div class="search-wrapper">
                <span class="search-icon">▸</span>
                <input type="text" id="searchInput" placeholder="SEARCH...">
            </div>
        </div>
        
        <div class="filter-bar" id="filterBar">
            <!-- Filter buttons will be rendered here -->
        </div>
    </header>

    <!-- Gallery -->
    <main class="gallery" id="gallery">
        <!-- Cards will be rendered here -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <span class="footer-pixel"></span>
        IP ARCHIVE
        <span class="footer-pixel"></span>
    </footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">×</button>
            <div class="modal-image">
                <img id="modalImage" src="" alt="">
            </div>
            <div class="modal-info">
                <h2 id="modalName"></h2>
                <p id="modalMeta" class="modal-meta"></p>
                <div class="modal-divider"></div>
                <p id="modalDescription" class="modal-desc"></p>
                <div class="modal-divider"></div>
                <div class="modal-actions">
                    <button id="copyNameBtn" class="btn-copy">COPY NAME</button>
                    <a id="brandLink" class="btn-link" href="" target="_blank">BRAND</a>
                    <a id="officialLink" class="btn-link" href="" target="_blank">OFFICIAL</a>
                    <a id="sourceLink" class="btn-link" href="" target="_blank">SOURCE</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">COPIED</div>

    <script src="JS/scripts.js"></script>
</body>
</html>
