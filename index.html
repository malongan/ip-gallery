<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP · ARCHIVE</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <h1 class="logo">IP ARCHIVE <span>CHARACTER COLLECTION</span></h1>
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="SEARCH...">
            </div>
        </div>
        
        <nav class="filter-bar" id="filterBar">
            <!-- Filter buttons will be rendered here -->
        </nav>
    </header>

    <!-- Gallery -->
    <main class="gallery" id="gallery">
        <!-- Cards will be rendered here -->
    </main>

    <!-- Footer -->
    <footer class="footer">IP ARCHIVE <span id="versionTag"></span></footer>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">×</button>
            <button id="editBtn" class="modal-edit-btn admin-locked">EDIT</button>
            
            <!-- View Mode -->
            <div id="modalView">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="">
                </div>
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p id="modalMeta" class="modal-meta"></p>
                    <div class="modal-divider"></div>
                    <p id="modalDescription" class="modal-desc"></p>
                    <div class="modal-divider"></div>
                    <div class="modal-actions">
                        <button id="copyNameBtn" class="btn-copy">COPY</button>
                        <a id="brandLink" class="btn-link" href="" target="_blank">BRAND</a>
                        <a id="officialLink" class="btn-link" href="" target="_blank">OFFICIAL</a>
                        <a id="sourceLink" class="btn-link" href="" target="_blank">SOURCE</a>
                    </div>
                </div>
            </div>
            
            <!-- Edit Mode -->
            <div id="modalEdit" style="display:none">
                <div class="modal-edit-body">
                    <div class="edit-section">
                        <label class="edit-label">PREVIEW IMAGE URL</label>
                        <div class="edit-url-row">
                            <input id="editPreview" class="edit-input" type="text" placeholder="https://...">
                            <button id="uploadBtn" class="edit-btn-sm" title="Upload new image">🖼</button>
                        </div>
                    </div>
                    <div class="edit-section">
                        <label class="edit-label">BRAND URL</label>
                        <input id="editBrandUrl" class="edit-input" type="text" placeholder="https://...">
                    </div>
                    <div class="edit-section">
                        <label class="edit-label">OFFICIAL URL</label>
                        <input id="editOfficialUrl" class="edit-input" type="text" placeholder="https://...">
                    </div>
                    <div class="edit-section">
                        <label class="edit-label">SOURCE URL</label>
                        <input id="editSourceUrl" class="edit-input" type="text" placeholder="https://...">
                    </div>
                    <div class="edit-section">
                        <label class="edit-label">DESCRIPTION</label>
                        <textarea id="editDescription" class="edit-textarea" rows="3" placeholder="Description text..."></textarea>
                    </div>
                    <div class="edit-actions">
                        <button id="saveEditBtn" class="btn-save">💾 SAVE</button>
                        <button id="cancelEditBtn" class="btn-cancel">CANCEL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">COPIED</div>

    <script src="JS/scripts.js"></script>
</body>
</html>
